<div class="table-wrap">

  @if (loading) {
    <mat-progress-bar mode="indeterminate" class="top-loader"></mat-progress-bar>
  }

  <table mat-table [dataSource]="songs" multiTemplateDataRows class="song-table">

    <ng-container matColumnDef="expand">
      <th mat-header-cell *matHeaderCellDef class="col-expand"></th>
      <td mat-cell *matCellDef="let song" class="col-expand">
        <mat-icon class="chevron" [class.open]="isExpanded(song)">
          expand_more
        </mat-icon>
      </td>
    </ng-container>

    <ng-container matColumnDef="index">
      <th mat-header-cell *matHeaderCellDef class="col-index">#</th>
      <td mat-cell *matCellDef="let song" class="col-index">
        <span class="index-num">{{ song.index }}</span>
        <button class="row-play" (click)="playSong(song, $event)"
                [class.row-play--loading]="isLoadingTrack(song)"
                [attr.aria-label]="isPlaying(song) ? 'Pause' : 'Play'">
          @if (isLoadingTrack(song)) {
            <span class="row-spinner"><mat-spinner diameter="16"></mat-spinner></span>
          } @else if (isPlaying(song)) {
            <span class="eq"><i></i><i></i><i></i></span>
          } @else {
            <mat-icon>play_arrow</mat-icon>
          }
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Song</th>
      <td mat-cell *matCellDef="let song"
          class="title-cell"
          [class.active]="isExpanded(song)"
          [class.playing]="isPlaying(song)">{{ song.title }}</td>
    </ng-container>

    <ng-container matColumnDef="artist">
      <th mat-header-cell *matHeaderCellDef>Artist</th>
      <td mat-cell *matCellDef="let song" class="muted">{{ song.artist }}</td>
    </ng-container>

    <ng-container matColumnDef="album">
      <th mat-header-cell *matHeaderCellDef>Album</th>
      <td mat-cell *matCellDef="let song" class="dim">{{ song.album }}</td>
    </ng-container>

    <ng-container matColumnDef="likes">
      <th mat-header-cell *matHeaderCellDef class="col-likes">
        <mat-icon class="heart-head">favorite</mat-icon>
      </th>
      <td mat-cell *matCellDef="let song" class="col-likes">
        <button class="like-btn" [class.liked]="displayLikes(song) > 0"
                (click)="like(song, $event)" matTooltip="Like">
          <mat-icon>favorite</mat-icon>{{ displayLikes(song) }}
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="detail">
      <td mat-cell *matCellDef="let song" [attr.colspan]="columns.length" class="detail-cell">
        <div class="detail-inner" [class.open]="isExpanded(song)">
          <div class="detail-content">
            @if (hasDetailContent(song)) {
              @if (detailsLoading) {
                <div class="detail-spinner">
                  <mat-spinner diameter="36"></mat-spinner>
                </div>
              }
              @if (!detailsLoading && expandedDetails) {
                <app-song-detail [details]="expandedDetails" />
              }
            }
          </div>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let song; columns: columns"
        class="data-row"
        [class.expanded]="isExpanded(song)"
        [class.is-playing]="isPlaying(song)"
        (click)="toggle(song)"></tr>
    <tr mat-row *matRowDef="let song; columns: ['detail']" class="detail-row"></tr>
  </table>

  <div class="pager">
    <button mat-icon-button [disabled]="page <= 1" (click)="goTo(1)" aria-label="First">
      <mat-icon>first_page</mat-icon>
    </button>
    <button mat-icon-button [disabled]="page <= 1" (click)="prevPage()" aria-label="Previous">
      <mat-icon>chevron_left</mat-icon>
    </button>

    @for (p of pageNumbers; track p) {
      <button mat-flat-button class="page-btn"
              [class.current]="p === page" (click)="goTo(p)">{{ p }}</button>
    }

    <button mat-icon-button (click)="nextPage()" aria-label="Next">
      <mat-icon>chevron_right</mat-icon>
    </button>
    <button mat-icon-button (click)="goTo(page + 4)" aria-label="Forward">
      <mat-icon>last_page</mat-icon>
    </button>
  </div>

</div>
